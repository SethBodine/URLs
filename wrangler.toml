name = "URLs"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# ─────────────────────────────────────────────────────────────────────────────
# KV NAMESPACE BINDING
# ─────────────────────────────────────────────────────────────────────────────
# The tokens below are substituted at build time by _build.sh using Cloudflare
# environment variables. The actual namespace IDs never appear in this file.
# See README.md for setup instructions.
# ─────────────────────────────────────────────────────────────────────────────

[[kv_namespaces]]
binding    = "LINKS"
id         = "__KV_NAMESPACE_ID__"
preview_id = "__KV_PREVIEW_NAMESPACE_ID__"

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS
# ─────────────────────────────────────────────────────────────────────────────
# ADMIN_KEY is set as a Cloudflare Pages environment variable:
#   Pages → Settings → Environment variables → ADMIN_KEY
#   Toggle "Encrypt" so it's stored as a secret.
# ─────────────────────────────────────────────────────────────────────────────
