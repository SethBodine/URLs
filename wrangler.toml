name = "link-shortener"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# ─────────────────────────────────────────────────────────────────────────────
# KV NAMESPACE BINDING
# ─────────────────────────────────────────────────────────────────────────────
# For Cloudflare Pages deployments (Git integration):
#   The KV binding is configured in the Cloudflare Pages dashboard ONLY.
#   Do NOT add a [[kv_namespaces]] block here — it conflicts with the dashboard.
#
#   Configure the binding at:
#   Pages → Settings → Functions → KV namespace bindings
#     Variable name: LINKS
#     KV namespace: <select your namespace>
#     Environment: Production + Preview
#
# The dashboard binding takes precedence and is the official way to configure
# KV for Pages projects. wrangler.toml is only used for local development.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS
# ─────────────────────────────────────────────────────────────────────────────
# ADMIN_KEY must be set as a Cloudflare Pages environment variable:
#   Pages → Settings → Environment variables → Add variable
#     Name: ADMIN_KEY
#     Value: <run: openssl rand -hex 32>
#     Environment: Production + Preview
#     Encrypt: ON
# ─────────────────────────────────────────────────────────────────────────────
