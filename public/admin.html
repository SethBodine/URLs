<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
    }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Auth Screen ────────────────────────────────────────────────────── */
    .auth-screen {
      max-width: 400px;
      margin: 6rem auto;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .auth-card h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.9375rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      margin-bottom: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    button {
      width: 100%;
      padding: 0.875rem;
      font-size: 0.9375rem;
      font-weight: 500;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-danger:hover:not(:disabled) {
      background: var(--danger-hover);
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg);
    }

    /* ── Admin Panel ────────────────────────────────────────────────────── */
    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .logout-btn {
      width: auto;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      color: var(--primary);
    }

    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 250px;
      padding: 0.625rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
    }

    .purge-btn {
      width: auto;
      padding: 0.625rem 1.25rem;
      font-size: 0.875rem;
    }

    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--bg);
      padding: 0.875rem 1rem;
      text-align: left;
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background: var(--bg);
    }

    .link-url {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .link-url:hover {
      text-decoration: underline;
    }

    .dest-url {
      color: var(--text-muted);
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .delete-btn {
      width: auto;
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
      background: var(--danger);
    }

    .delete-btn:hover {
      background: var(--danger-hover);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    /* ── Modal ──────────────────────────────────────────────────────────── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }

    .modal h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }

    .modal p {
      margin-bottom: 1.5rem;
      color: var(--text-muted);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
    }

    .modal-actions button {
      flex: 1;
    }

    @media (max-width: 768px) {
      .controls {
        flex-direction: column;
      }

      .search-input {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.8125rem;
      }

      th, td {
        padding: 0.625rem 0.75rem;
      }

      .dest-url {
        max-width: 150px;
      }
    }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h1>Admin Login</h1>
      <form id="auth-form">
        <input 
          type="password" 
          id="key-input" 
          placeholder="Enter admin key" 
          required 
          autocomplete="off"
        />
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="panel container">
    <header>
      <h1>Admin Panel</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Links</div>
        <div class="stat-value" id="total-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Created Today</div>
        <div class="stat-value" id="today-count">0</div>
      </div>
    </div>

    <div class="controls">
      <input 
        type="text" 
        class="search-input" 
        id="search-input" 
        placeholder="Search links..." 
      />
      <button class="purge-btn btn-danger" onclick="confirmPurge()">Purge All</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Short Link</th>
            <th>Destination</th>
            <th>Created</th>
            <th>Country</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="links-table">
          <tr>
            <td colspan="5" class="empty-state">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal">
    <div class="modal-content">
      <h2 id="modal-title">Confirm</h2>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-danger" id="modal-confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // ── Runtime domain injection ─────────────────────────────────────────────
    (function() {
      const hostname = window.location.hostname;
      document.title = hostname + ' — admin';
    })();

    const SESSION_KEY = 'admin_key_' + window.location.hostname;
    let adminKey = sessionStorage.getItem(SESSION_KEY) || '';
    let allLinks = [];
    let filteredLinks = [];

    // ── Auth ─────────────────────────────────────────────────────────────────
    if (adminKey) {
      showPanel();
    }

    document.getElementById('auth-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const key = document.getElementById('key-input').value.trim();
      if (key) {
        adminKey = key;
        sessionStorage.setItem(SESSION_KEY, key);
        showPanel();
      }
    });

    function showPanel() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('admin-panel').classList.add('active');
      loadLinks();
    }

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      location.reload();
    }

    // ── Load Links ───────────────────────────────────────────────────────────
    async function loadLinks() {
      try {
        const res = await fetch('/api/admin', {
          headers: { 'Authorization': `Bearer ${adminKey}` }
        });

        if (!res.ok) {
          if (res.status === 401) {
            alert('Invalid admin key');
            logout();
            return;
          }
          throw new Error('Failed to load links');
        }

        const data = await res.json();
        allLinks = data.links || [];
        filterLinks();
        updateStats();
      } catch (err) {
        alert(err.message);
      }
    }

    // ── Search & Filter ──────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', (e) => {
      filterLinks(e.target.value);
    });

    function filterLinks(query = '') {
      query = query.toLowerCase();
      filteredLinks = allLinks.filter(link => 
        link.slug.toLowerCase().includes(query) ||
        link.url.toLowerCase().includes(query) ||
        (link.country || '').toLowerCase().includes(query)
      );
      renderLinks();
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function renderLinks() {
      const tbody = document.getElementById('links-table');
      
      if (filteredLinks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No links found</td></tr>';
        return;
      }

      tbody.innerHTML = filteredLinks.map(link => {
        const shortUrl = window.location.origin + '/' + link.slug;
        const created = new Date(link.createdAt).toLocaleDateString();
        
        return `
          <tr>
            <td><a href="${shortUrl}" class="link-url" target="_blank">${link.slug}</a></td>
            <td><div class="dest-url" title="${link.url}">${link.url}</div></td>
            <td>${created}</td>
            <td>${link.country || '—'}</td>
            <td><button class="delete-btn" onclick="confirmDelete('${link.slug}')">Delete</button></td>
          </tr>
        `;
      }).join('');
    }

    function updateStats() {
      document.getElementById('total-count').textContent = allLinks.length;
      
      const today = new Date().toDateString();
      const todayCount = allLinks.filter(link => 
        new Date(link.createdAt).toDateString() === today
      ).length;
      document.getElementById('today-count').textContent = todayCount;
    }

    // ── Delete ───────────────────────────────────────────────────────────────
    function confirmDelete(slug) {
      showModal(
        'Delete Link',
        `Delete link: ${slug}?`,
        () => deleteLink(slug)
      );
    }

    async function deleteLink(slug) {
      try {
        const res = await fetch('/api/admin', {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${adminKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ slug })
        });

        if (!res.ok) throw new Error('Failed to delete link');

        closeModal();
        loadLinks();
      } catch (err) {
        alert(err.message);
      }
    }

    // ── Purge All ────────────────────────────────────────────────────────────
    function confirmPurge() {
      showModal(
        'Purge All Links',
        `Delete all ${allLinks.length} links? This cannot be undone.`,
        purgeAll
      );
    }

    async function purgeAll() {
      try {
        const res = await fetch('/api/admin', {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${adminKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ purgeAll: true })
        });

        if (!res.ok) throw new Error('Failed to purge links');

        closeModal();
        loadLinks();
      } catch (err) {
        alert(err.message);
      }
    }

    // ── Modal ────────────────────────────────────────────────────────────────
    function showModal(title, message, onConfirm) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;
      document.getElementById('modal-confirm-btn').onclick = onConfirm;
      document.getElementById('confirm-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('confirm-modal').classList.remove('active');
    }
  </script>
</body>
</html>
