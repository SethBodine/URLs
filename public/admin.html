<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --surface: #111118;
      --raised:  #18181f;
      --border:  #242430;
      --border2: #2e2e3d;
      --text:    #e8e8f0;
      --muted:   #666680;
      --dim:     #3a3a50;
      --accent:  #7c5cfc;
      --accent2: #a78bfa;
      --green:   #10b981;
      --amber:   #f59e0b;
      --red:     #ef4444;
      --radius:  10px;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'DM Sans', sans-serif;

    /* light mode overrides */
    }
    [data-theme="light"] {
      --bg:      #f4f4f8;
      --surface: #ffffff;
      --raised:  #ebebf2;
      --border:  #d8d8e8;
      --border2: #c8c8dc;
      --text:    #1a1a2e;
      --muted:   #6b6b8a;
      --dim:     #b0b0c8;
      --accent:  #6a3fdb;
      --accent2: #7c5cfc;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,92,252,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,92,252,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1280px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── Auth ── */
    .auth-wrap {
      max-width: 400px; margin: 6rem auto;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.25rem;
    }

    .auth-card h1 {
      font-family: var(--mono);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent2);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.7rem 1rem;
      font-size: 0.9375rem;
      font-family: var(--mono);
      background: var(--raised);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      margin-bottom: 1rem;
    }

    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,252,0.15); }

    button {
      width: 100%;
      padding: 0.8rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: var(--sans);
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover:not(:disabled) { background: var(--accent2); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-ghost {
      background: var(--raised);
      color: var(--muted);
      border: 1px solid var(--border2);
      width: auto;
      padding: 0.45rem 1rem;
      font-size: 0.8125rem;
    }

    .btn-ghost:hover { color: var(--text); background: var(--border); }

    .btn-danger { background: var(--red); }
    .btn-danger:hover { background: #b91c1c; }

    /* ── Panel ── */
    .panel { display: none; }
    .panel.active { display: block; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .header-title {
      font-family: var(--mono);
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
    }

    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
    .stat-value { font-size: 2rem; font-weight: 700; font-family: var(--mono); color: var(--accent2); }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .search-input {
      flex: 1;
      min-width: 220px;
      padding: 0.6rem 1rem;
      font-size: 0.875rem;
      font-family: var(--mono);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
    }

    .search-input:focus { outline: none; border-color: var(--accent); }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: var(--raised);
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.8rem 1rem;
      font-size: 0.8125rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(124,92,252,0.03); }

    .slug-link {
      font-family: var(--mono);
      font-weight: 600;
      color: var(--accent2);
      text-decoration: none;
    }
    .slug-link:hover { text-decoration: underline; }

    .dest-cell {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }

    .pill {
      display: inline-block;
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.1rem 0.5rem;
      font-size: 0.7rem;
      font-family: var(--mono);
      margin-right: 0.25rem;
    }

    .pill.preview { border-color: var(--amber); color: var(--amber); }
    .pill.owned   { border-color: var(--accent); color: var(--accent); }
    .pill.expiry  { border-color: var(--red); color: var(--red); }

    .delete-btn {
      width: auto;
      padding: 0.3rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(239,68,68,0.15);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
    }
    .delete-btn:hover { background: rgba(239,68,68,0.25); }

    /* ── Theme toggle ── */
    .theme-toggle {
      background: var(--raised);
      color: var(--muted);
      border: 1px solid var(--border2);
      width: auto;
      padding: 0.4rem 0.75rem;
      font-size: 0.8125rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .theme-toggle:hover { background: var(--border); color: var(--text); }

    /* ── Meta row (below each data row) ── */
    .meta-row td {
      background: var(--raised);
      padding: 0.6rem 1rem 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .meta-row:hover td { background: var(--raised); }

    .meta-section {
      margin-bottom: 0.5rem;
    }
    .meta-label {
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .ip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .ip-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 0.15rem 0.5rem;
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--text);
    }
    .ip-chip .ts {
      color: var(--muted);
      font-size: 0.65rem;
    }
    .ip-chip.creator {
      border-color: var(--accent);
      color: var(--accent2);
    }
    .sb-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-family: var(--mono);
      font-weight: 500;
    }
    .sb-safe    { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: var(--green); }
    .sb-threat  { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3);  color: var(--red);   }
    .sb-skipped { background: var(--raised);          border: 1px solid var(--border2);        color: var(--muted); }
    .sb-threats-list { font-size: 0.7rem; color: var(--red); margin-top: 0.2rem; font-family: var(--mono); }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 1.75rem;
      max-width: 440px;
      width: 100%;
    }

    .modal h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; }
    .modal p  { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }

    .modal-actions { display: flex; gap: 0.75rem; }
    .modal-actions button { flex: 1; }

    @media (max-width: 768px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .dest-cell { max-width: 140px; }
      td, th { padding: 0.6rem 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- Auth -->
  <div id="auth-wrap" class="auth-wrap">
    <div class="auth-card">
      <h1>admin access</h1>
      <form id="auth-form">
        <input type="password" id="key-input" placeholder="Enter admin key" required autocomplete="off" />
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <!-- Panel -->
  <div id="admin-panel" class="panel container">
    <header>
      <div class="header-title" id="admin-title">admin panel</div>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">☀ Light</button>
        <button class="btn-ghost" onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Links</div>
        <div class="stat-value" id="total-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Created Today</div>
        <div class="stat-value" id="today-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Accesses</div>
        <div class="stat-value" id="total-accesses">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Owner-Linked</div>
        <div class="stat-value" id="owned-count">0</div>
      </div>
    </div>

    <div class="controls">
      <input type="text" class="search-input" id="search-input" placeholder="Search slug, url, IP, country…" />
      <button class="btn-ghost btn-danger" style="width:auto;padding:0.5rem 1.1rem;font-size:0.875rem;" onclick="confirmPurge()">Purge All</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Slug</th>
            <th>Destination</th>
            <th>Created</th>
            <th>Hits</th>
            <th>Country</th>
            <th>Creator IP</th>
            <th>Flags</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="links-table">
          <tr><td colspan="8" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal-backdrop">
    <div class="modal">
      <h2 id="modal-title">Confirm</h2>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-danger" id="modal-confirm-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // XSS-safe HTML escape
    function esc(str) {
      return String(str || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── Theme ──────────────────────────────────────────────────────────────
    const THEME_KEY = 'admin_theme_' + location.hostname;
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = t === 'light' ? '🌙 Dark' : '☀ Light';
      localStorage.setItem(THEME_KEY, t);
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      applyTheme(current === 'light' ? 'dark' : 'light');
    }
    // Restore saved theme
    applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

    (function() {
      document.title = location.hostname + ' — admin';
      document.getElementById('admin-title').textContent = location.hostname + ' admin';
    })();

    const SESSION_KEY    = 'admin_key_' + location.hostname;
    const ACTIVITY_KEY   = 'admin_activity_' + location.hostname;
    const INACTIVITY_MS  = 60 * 60 * 1000; // 1 hour

    let adminKey  = sessionStorage.getItem(SESSION_KEY) || '';
    let allLinks  = [];
    let inactivityTimer = null;

    // ── Inactivity logout ────────────────────────────────────────────────────
    function resetInactivityTimer() {
      sessionStorage.setItem(ACTIVITY_KEY, Date.now());
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(inactivityLogout, INACTIVITY_MS);
    }

    function inactivityLogout() {
      sessionStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(ACTIVITY_KEY);
      // Show a brief message before reload so the user knows why they were logged out
      const wrap = document.getElementById('auth-wrap');
      const card = wrap?.querySelector('.auth-card');
      if (card) {
        const msg = document.createElement('p');
        msg.textContent = 'Logged out after 1 hour of inactivity.';
        msg.style.cssText = 'color:#f59e0b;font-size:0.8125rem;text-align:center;margin-bottom:1rem;';
        card.insertBefore(msg, card.firstChild);
      }
      document.getElementById('auth-wrap').style.display = '';
      document.getElementById('admin-panel').classList.remove('active');
      adminKey = '';
    }

    function startInactivityWatch() {
      // Reset timer on any mouse, keyboard, or touch activity
      ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'click'].forEach(evt =>
        document.addEventListener(evt, resetInactivityTimer, { passive: true })
      );

      // Check if the tab was left open and already expired (e.g. computer woke from sleep)
      const lastActivity = parseInt(sessionStorage.getItem(ACTIVITY_KEY) || '0', 10);
      if (lastActivity && Date.now() - lastActivity >= INACTIVITY_MS) {
        inactivityLogout();
        return;
      }

      resetInactivityTimer();
    }

    // ── Session ──────────────────────────────────────────────────────────────
    if (adminKey) showPanel();

    document.getElementById('auth-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const k = document.getElementById('key-input').value.trim();
      if (k) { adminKey = k; sessionStorage.setItem(SESSION_KEY, k); showPanel(); }
    });

    function showPanel() {
      document.getElementById('auth-wrap').style.display = 'none';
      document.getElementById('admin-panel').classList.add('active');
      startInactivityWatch();
      loadLinks();
    }

    function logout() {
      clearTimeout(inactivityTimer);
      sessionStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(ACTIVITY_KEY);
      location.reload();
    }

    async function loadLinks() {
      try {
        const res = await fetch('/api/admin', { headers: { 'Authorization': 'Bearer ' + adminKey } });
        if (!res.ok) { if (res.status === 401) { alert('Invalid admin key'); logout(); return; } throw new Error('Failed'); }
        const data = await res.json();
        allLinks = (data.links || []).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        renderLinks(allLinks);
        updateStats();
      } catch (err) { alert(err.message); }
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      renderLinks(allLinks.filter(l => {
        if (l.slug.toLowerCase().includes(q)) return true;
        if (l.url.toLowerCase().includes(q)) return true;
        if ((l.creatorCountry || l.country || '').toLowerCase().includes(q)) return true;
        if ((l.creatorIp || l.ip || '').toLowerCase().includes(q)) return true;
        // search access log IPs too
        if (Array.isArray(l.accessLog) && l.accessLog.some(e => (e.ip || '').toLowerCase().includes(q))) return true;
        return false;
      }));
    });

    function renderLinks(links) {
      const tbody = document.getElementById('links-table');
      if (!links.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No links found</td></tr>'; return; }

      tbody.innerHTML = links.map(link => {
        const shortUrl   = location.origin + '/' + esc(link.slug);
        const created    = new Date(link.createdAt).toLocaleDateString();
        const country    = esc(link.creatorCountry || link.country || '—');
        const hits       = link.accessCount || 0;
        const expires    = link.expiresAt ? new Date(link.expiresAt).toLocaleDateString() : null;
        const creatorIp  = esc(link.creatorIp || link.ip || '—');

        const flags = [];
        if (link.previewMode) flags.push('<span class="pill preview">preview</span>');
        if (link.ownerHash)   flags.push('<span class="pill owned">owned</span>');
        if (expires)          flags.push('<span class="pill expiry">exp ' + esc(expires) + '</span>');

        // ── Access log IP chips ────────────────────────────────────────────
        const accessLog = Array.isArray(link.accessLog) ? link.accessLog : [];
        const ipChips = accessLog.map(entry => {
          const ts = entry.ts ? new Date(entry.ts).toLocaleString() : '';
          const loc = [entry.city, entry.country].filter(Boolean).join(', ');
          return `<span class="ip-chip" title="${esc(ts)}${loc ? ' · ' + esc(loc) : ''}">
            ${esc(entry.ip || '?')}${ts ? `<span class="ts">${esc(new Date(entry.ts).toLocaleDateString())}</span>` : ''}
          </span>`;
        }).join('');

        // ── Safe Browsing badge ────────────────────────────────────────────
        let sbHtml = '';
        const sb = link.safeBrowsing;
        if (sb) {
          if (!sb.checked) {
            sbHtml = `<span class="sb-badge sb-skipped">⚪ Not checked</span>
                      <div style="font-size:0.7rem;color:var(--muted);margin-top:0.2rem;">SAFE_BROWSING_API_KEY not configured</div>`;
          } else if (sb.threats && sb.threats.length) {
            sbHtml = `<span class="sb-badge sb-threat">⛔ Threats detected</span>
                      <div class="sb-threats-list">${sb.threats.map(t => esc(t.replace(/_/g,' '))).join(', ')}</div>`;
          } else {
            const checkedAt = sb.checkedAt ? new Date(sb.checkedAt).toLocaleString() : '';
            sbHtml = `<span class="sb-badge sb-safe">✓ Clean</span>${checkedAt ? `<span style="font-size:0.65rem;color:var(--muted);margin-left:0.5rem;">${esc(checkedAt)}</span>` : ''}`;
          }
        } else {
          sbHtml = `<span class="sb-badge sb-skipped">— No data</span>`;
        }

        const mainRow = `<tr>
          <td><a href="${shortUrl}" class="slug-link" target="_blank">${esc(link.slug)}</a></td>
          <td><div class="dest-cell" title="${esc(link.url)}">${esc(link.url)}</div></td>
          <td>${esc(created)}</td>
          <td>${esc(hits)}</td>
          <td>${country}</td>
          <td><span class="ip-chip creator" title="Creator IP">${creatorIp}</span></td>
          <td>${flags.join('') || '—'}</td>
          <td><button class="delete-btn" onclick="confirmDelete(${JSON.stringify(link.slug)})">Delete</button></td>
        </tr>`;

        const metaRow = `<tr class="meta-row">
          <td colspan="8">
            ${accessLog.length > 0 ? `
            <div class="meta-section">
              <div class="meta-label">View IPs (${accessLog.length})</div>
              <div class="ip-list">${ipChips}</div>
            </div>` : ''}
            <div class="meta-section">
              <div class="meta-label">Google Safe Browsing</div>
              ${sbHtml}
            </div>
          </td>
        </tr>`;

        return mainRow + metaRow;
      }).join('');
    }

    function updateStats() {
      document.getElementById('total-count').textContent = allLinks.length;

      const today = new Date().toDateString();
      const todayCount = allLinks.filter(l => new Date(l.createdAt).toDateString() === today).length;
      document.getElementById('today-count').textContent = todayCount;

      const totalAccesses = allLinks.reduce((s, l) => s + (l.accessCount || 0), 0);
      document.getElementById('total-accesses').textContent = totalAccesses;

      const owned = allLinks.filter(l => l.ownerHash).length;
      document.getElementById('owned-count').textContent = owned;
    }

    function confirmDelete(slug) {
      showModal('Delete Link', 'Permanently delete /' + slug + '?', () => deleteLink(slug));
    }

    async function deleteLink(slug) {
      try {
        const res = await fetch('/api/admin', {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + adminKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug }),
        });
        if (!res.ok) throw new Error('Failed to delete');
        closeModal();
        loadLinks();
      } catch (err) { alert(err.message); }
    }

    function confirmPurge() {
      showModal('Purge All Links', 'Delete all ' + allLinks.length + ' links? This is permanent and irreversible.', purgeAll);
    }

    async function purgeAll() {
      try {
        const res = await fetch('/api/admin', {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + adminKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({ purgeAll: true }),
        });
        if (!res.ok) throw new Error('Failed to purge');
        closeModal();
        loadLinks();
      } catch (err) { alert(err.message); }
    }

    function showModal(title, msg, onConfirm) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = msg;
      document.getElementById('modal-confirm-btn').onclick = onConfirm;
      document.getElementById('confirm-modal').classList.add('show');
    }

    function closeModal() { document.getElementById('confirm-modal').classList.remove('show'); }

    document.getElementById('confirm-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
